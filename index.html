<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cassino Corrupto v2.0 - Modo Influencer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="casino-wrapper">
        <h1>SLOT MASTER <span>3000</span></h1>
        
        <div class="maquina-container">
            <div class="reels">
                <div class="reel" id="reel1">
                    <div class="icons-container"></div>
                </div>
                <div class="reel" id="reel2">
                    <div class="icons-container"></div>
                </div>
                <div class="reel" id="reel3">
                    <div class="icons-container"></div>
                </div>
            </div>
            <div class="payline"></div>
        </div>

        <div class="ui-panel">
            <button id="spin-button" onclick="jogar()">GIRAR (R$ 10)</button>
            <div class="stats">
                <p>Saldo: <strong>R$ <span id="saldo">100.00</span></strong></p>
                <p id="feedback">Boa sorte!</p>
            </div>
        </div>

        <div class="admin-dashboard">
            <h3>⚙️ PAINEL DE MANIPULAÇÃO (ADMIN)</h3>
            <div class="admin-controls">
                <label class="switch-container">
                    <input type="radio" name="mode" value="normal" checked onchange="setMode('normal')">
                    Modo Justo (Aleatório)
                </label>
                <label class="switch-container">
                    <input type="radio" name="mode" value="corrupto" onchange="setMode('corrupto')">
                    Modo Corrupto (Casa Ganha)
                </label>
                <label class="switch-container influencer">
                    <input type="radio" name="mode" value="influencer" onchange="setMode('influencer')">
                    Modo Influencer (90% Win)
                </label>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
